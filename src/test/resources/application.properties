# ===== Configuracion para las pruebas (incluye lo necesario + consola limpia) =====
spring.application.name=minimarket

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
app.jwt.secret=${JWT_SECRET:ClaveSecretaMiniMarketPlusS6_2025_minimo32caracteres!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

server.error.include-stacktrace=never
server.error.include-message=never

# Consola limpia durante las pruebas
spring.jpa.show-sql=false
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework=WARN
