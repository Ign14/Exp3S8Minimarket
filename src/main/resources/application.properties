spring.application.name=minimarket

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Configuracion JWT (clave y expiracion por variable de entorno en produccion)
app.jwt.secret=${JWT_SECRET:ClaveSecretaMiniMarketPlusS6_2025_minimo32caracteres!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# No exponer detalles internos en errores
server.error.include-stacktrace=never
server.error.include-message=never

# Documentacion OpenAPI / Swagger UI
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.path=/swagger-ui.html
